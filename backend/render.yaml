services:
  - type: web
    name: scoreku-api
    env: node
    buildCommand: |
      npm install
      # Install Python and dependencies for the ML model
      apt-get update && apt-get install -y python3 python3-pip
      pip3 install numpy scikit-learn shap joblib xgboost
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
